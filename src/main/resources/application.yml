server:
  port: 8080

spring:
  application:
    name: petstore-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/petstore
    username: petstore
    password: petstore
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

petstore:
  jwt:
    secret: change-me-in-production-use-at-least-32-characters-long-secret
    expiration-ms: 86400000
  admin:
    username: admin
    password: admin123
